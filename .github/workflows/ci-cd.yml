# CI en push/PR (incluye rama workflow para validar antes de producción).
# Imágenes Docker → Amazon ECR (registro de contenedores). ECS ejecuta la imagen.
# S3 almacena objetos/archivos estáticos; no sustituye a ECR para imágenes.
# Despliegue (push a ECR + ECS) solo en main/master cuando vars.ENABLE_AWS_DEPLOY == 'true' y existan los secrets de AWS/Vite.
# AWS OIDC: https://docs.github.com/en/actions/deployment/security-hardening-your-deployments/configuring-openid-connect-in-amazon-web-services

name: CI and deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - workflow
      - layout
      # - staging
      # - develop
      # - release
  pull_request:
    branches:
      - main
      - master
      - workflow
      - layout
      # - staging
      # - develop
      # - release

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "22"

jobs:
  quality:
    name: Quality and security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Dependency audit (moderate+)
        run: npm audit --audit-level=moderate

      - name: Secret scan (TruffleHog) — pull request
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@v3.88.27
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

      - name: Secret scan (TruffleHog) — push
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        uses: trufflesecurity/trufflehog@v3.88.27
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified

      - name: Secret scan (TruffleHog) — primer push en la rama
        if: github.event_name == 'push' && github.event.before == '0000000000000000000000000000000000000000'
        uses: trufflesecurity/trufflehog@v3.88.27
        with:
          path: ./
          extra_args: --only-verified

      - name: Secret scan (TruffleHog) — ejecución manual
        if: github.event_name == 'workflow_dispatch'
        uses: trufflesecurity/trufflehog@v3.88.27
        with:
          path: ./
          extra_args: --only-verified

      - name: Semgrep
        run: |
          python3 -m pip install --user semgrep
          export PATH="$HOME/.local/bin:$PATH"
          semgrep scan --config auto --error

      - name: ESLint
        run: npx eslint src --max-warnings=0

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests (Vitest)
        run: npm run test.unit

      - name: Build (Vite)
        run: npm run build

  docker-verify:
    name: Docker build (sin publicar)
    runs-on: ubuntu-latest
    needs: quality
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' &&
        github.ref != 'refs/heads/main' &&
        github.ref != 'refs/heads/master')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            --build-arg VITE_COGNITO_REGION=ci-placeholder \
            --build-arg VITE_COGNITO_USER_POOL_ID=ci-placeholder \
            --build-arg VITE_COGNITO_USER_POOL_CLIENT_ID=ci-placeholder \
            --build-arg VITE_COGNITO_DOMAIN=ci-placeholder.example.com \
            --build-arg VITE_COGNITO_REDIRECT_SIGN_IN=http://localhost:5173/ \
            --build-arg VITE_COGNITO_REDIRECT_SIGN_OUT=http://localhost:5173/ \
            --build-arg VITE_COGNITO_OAUTH_SCOPES=openid,email \
            --build-arg VITE_CHAT_WS_URL=wss://ci-placeholder.example.com \
            --build-arg VITE_AUTH_DEBUG=false \
            -t feria:ci-verify \
            .

  # Para activar deploy en otras ramas, agrega dentro del if del job deploy:
  #   || github.ref == 'refs/heads/staging'
  #   || github.ref == 'refs/heads/develop'
  #   || github.ref == 'refs/heads/release'
  #   || github.ref == 'refs/heads/layout'
  #   || github.ref == 'refs/heads/workflow'
  #
  # Secrets requeridos en GitHub → Settings → Secrets → Actions:
  #   AWS_ROLE_TO_ASSUME
  #   VITE_COGNITO_REGION
  #   VITE_COGNITO_USER_POOL_ID
  #   VITE_COGNITO_USER_POOL_CLIENT_ID
  #   VITE_COGNITO_DOMAIN
  #   VITE_COGNITO_REDIRECT_SIGN_IN
  #   VITE_COGNITO_REDIRECT_SIGN_OUT
  #   VITE_CHAT_WS_URL
  #
  # Variables requeridas en GitHub → Settings → Variables → Actions:
  #   ENABLE_AWS_DEPLOY = true
  #   AWS_REGION        = us-east-1
  #   ECR_REPOSITORY    = feria-app
  #   ECS_CLUSTER       = feria-cluster
  #   ECS_SERVICE       = feria-service
  #   VITE_COGNITO_OAUTH_SCOPES = openid,email
  deploy:
    name: Docker, ECR and ECS
    runs-on: ubuntu-latest
    needs: quality
    if: |
      vars.ENABLE_AWS_DEPLOY == 'true' &&
      github.event_name == 'push' &&
      (
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/master'
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg VITE_COGNITO_REGION="${{ secrets.VITE_COGNITO_REGION }}" \
            --build-arg VITE_COGNITO_USER_POOL_ID="${{ secrets.VITE_COGNITO_USER_POOL_ID }}" \
            --build-arg VITE_COGNITO_USER_POOL_CLIENT_ID="${{ secrets.VITE_COGNITO_USER_POOL_CLIENT_ID }}" \
            --build-arg VITE_COGNITO_DOMAIN="${{ secrets.VITE_COGNITO_DOMAIN }}" \
            --build-arg VITE_COGNITO_REDIRECT_SIGN_IN="${{ secrets.VITE_COGNITO_REDIRECT_SIGN_IN }}" \
            --build-arg VITE_COGNITO_REDIRECT_SIGN_OUT="${{ secrets.VITE_COGNITO_REDIRECT_SIGN_OUT }}" \
            --build-arg VITE_COGNITO_OAUTH_SCOPES="${{ vars.VITE_COGNITO_OAUTH_SCOPES || 'openid,email' }}" \
            --build-arg VITE_CHAT_WS_URL="${{ secrets.VITE_CHAT_WS_URL }}" \
            --build-arg VITE_AUTH_DEBUG=false \
            -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" \
            -t "$REGISTRY/$REPOSITORY:latest" \
            .
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$REPOSITORY:latest"

      - name: Deploy ECS service
        env:
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
          ECS_SERVICE: ${{ vars.ECS_SERVICE }}
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment